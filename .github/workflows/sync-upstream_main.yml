name: Sync upstream main to origin main

on:
  schedule:
    # KST 03:10 daily = UTC 18:10 previous day
    - cron: "10 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/NightowlKr/netbox.git
          git fetch upstream main

      - name: Reset origin master to upstream master
        run: |
          git checkout main
          git reset --hard upstream/main
          git push origin main --force-with-lease
